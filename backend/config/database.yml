default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("BACKEND_DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("BACKEND_DATABASE_PORT", 5432) %>
  database: <%= ENV.fetch("BACKEND_DATABASE_NAME") %>
  username: <%= ENV.fetch("BACKEND_DATABASE_USER") %>
  password: <%= ENV.fetch("BACKEND_DATABASE_PASSWORD") %>

development:
  <<: *default
  database: <%= ENV.fetch("BACKEND_DATABASE_NAME", "backend_development") %>

test:
  <<: *default
  database: backend_test

production:
  <<: *default
  database: <%= ENV.fetch("BACKEND_DATABASE_NAME", "backend_production") %>
