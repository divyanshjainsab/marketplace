default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") %>
  host: <%= ENV.fetch("SSO_DATABASE_HOST") %>
  port: <%= ENV.fetch("SSO_DATABASE_PORT") %>
  database: <%= ENV.fetch("SSO_DATABASE_NAME") %>
  username: <%= ENV.fetch("SSO_DATABASE_USER") %>
  password: <%= ENV.fetch("SSO_DATABASE_PASSWORD") %>

development:
  <<: *default
  database: <%= ENV.fetch("SSO_DATABASE_NAME") %>

test:
  <<: *default
  database: sso_test

production:
  <<: *default
  database: <%= ENV.fetch("SSO_DATABASE_NAME") %>
